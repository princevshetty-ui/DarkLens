<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarkLens</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <main class="popup-wrap">
      <section class="card">
        <h1 class="brand">DarkLens Extension</h1>
        <p class="sub">Capture page. Detect dark patterns. Open report.</p>

        <div id="authGate" class="stack">
          <h2 class="section-title">Sign In</h2>
          <input id="nameInput" class="input" type="text" placeholder="Your name" />
          <input id="emailInput" class="input" type="email" placeholder="College email" />
          <button id="loginBtn" class="btn btn-primary">Save and Continue</button>
        </div>

        <div id="analyzePanel" class="stack hidden">
          <div class="pill-row">
            <span class="pill" id="userPill">Signed in</span>
          </div>

          <label class="label" for="apiBaseInput">Backend API Base URL</label>
          <input id="apiBaseInput" class="input" type="url" placeholder="http://127.0.0.1:8000" />
          <button id="saveApiBtn" class="btn btn-secondary">Save API URL</button>

          <button id="analyzeBtn" class="btn btn-primary big">Analyze This Page</button>
          <button id="logoutBtn" class="btn btn-secondary">Log Out</button>
        </div>

        <p id="statusText" class="status">Ready.</p>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
